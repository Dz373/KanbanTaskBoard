<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/scripts/index.css">
    <title>taskboard</title>
  </head>
  
  <body>
    <input type="text" id="titleInput" placeholder="Enter Title"></input>

    <div id="mainBody">
      <div class="column">
        <h3 class="columnHeader">To Do</h3>
        <button id="createToDo" class="createTaskBtn">New Task</button>

        <div id="columnToDo" class="columnItems">
          
        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">In Progress</h3>
        <button id="createInProgress" class="createTaskBtn">New Task</button>

        <div id="columnInProgress" class="columnItems">
          
        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">In Review</h3>
        <button id="createInReview" class="createTaskBtn">New Task</button>

        <div id="columnInReview" class="columnItems">

        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">Done</h3>
        <button id="createDone" class="createTaskBtn">New Task</button>

        <div id="columnDone" class="columnItems">

        </div>

      </div>

    </div>

    <script type="module" src="src/scripts/app.tsx"></script>
  
  </body>
</html>
