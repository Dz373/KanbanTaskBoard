<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/scripts/index.css">
    <title>taskboard</title>
  </head>
  
  <body>
    <input type="text" id="input" placeholder="Enter XML or text..."></input>
    <button id="btn">Submit</button>
    <p id="output"></p>

    <div id="mainBody">
      <div class="column">
        <h3 class="columnHeader">To Do</h3>

        <div id="columnToDo" class="columnItems">
          
          <div class="item" draggable="true">item 1</div>
          <div class="item" draggable="true">item 2</div>
          <div class="item" draggable="true">item 3</div>
        
        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">In Progress</h3>

        <div id="columnInProgress" class="columnItems">
          
        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">In Review</h3>

        <div id="columnInReview" class="columnItems">

        </div>

      </div>

      <div class="column">
        <h3 class="columnHeader">Done</h3>

        <div id="columnDone" class="columnItems">

        </div>

      </div>

    </div>

    <script type="module" src="src/scripts/app.ts"></script>
    <script type="module" src="src/scripts/dragging.ts"></script>
  
  </body>
</html>
